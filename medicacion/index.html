<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medicación · Servicio de quimioterapia</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="contenedor">
    <div class="encabezado-sesion">
      <div>
        <img src="../assets/FUESMEN-Logo.png" alt="FUESMEN" style="height: 32px; width: auto; margin-bottom: 8px;" />
        <div class="breadcrumb"><a href="../index.html">Inicio</a> &gt; Medicación</div>
        <h1 style="margin-bottom:0;">Medicación</h1>
      </div>
      <div style="text-align:right;">
        <div class="datos-sesion" id="datos-sesion"></div>
        <button class="boton-secundario" style="margin-top:8px;" onclick="cerrarSesion('../login.html')">Cerrar sesión</button>
      </div>
    </div>

    <div class="tarjetas tarjetas-principales">
      <a class="tarjeta tarjeta-destacada" href="entregas.html" id="tarjeta-entregas" style="display:none;">
        <span class="etiqueta-tipo-carga etiqueta-tipo-ingreso">ingreso</span>
        <div class="tarjeta-titulo">carga de medicación</div>
        <div class="tarjeta-texto">Registrar el ingreso de medicación de un paciente.</div>
        <div class="tarjeta-enlace">Entrar →</div>
      </a>
      <a class="tarjeta tarjeta-destacada-egreso" href="egresos.html" id="tarjeta-egresos" style="display:none;">
        <span class="etiqueta-tipo-carga etiqueta-tipo-egreso">egreso</span>
        <div class="tarjeta-titulo">tratamientos</div>
        <div class="tarjeta-texto">Registrar la medicación utilizada en un tratamiento.</div>
        <div class="tarjeta-enlace">Entrar →</div>
      </a>
    </div>

    <a class="tarjeta tarjeta-secundaria" href="herramientas.html">
      <div class="tarjeta-titulo">otras herramientas</div>
      <div class="tarjeta-texto">Catálogo de medicamentos, pacientes, stock e importación masiva.</div>
      <div class="tarjeta-enlace">Entrar →</div>
    </a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth((user, datosUsuario) => {
      const rolLabel = ROLES[datosUsuario.rol] || datosUsuario.rol;
      document.getElementById("datos-sesion").innerHTML =
        `Hola, <strong>${datosUsuario.nombre || user.email}</strong> · rol: <strong>${rolLabel}</strong>`;

      if (datosUsuario.rol === "administrador" || datosUsuario.rol === "enfermeria") {
        document.getElementById("tarjeta-entregas").style.display = "block";
        document.getElementById("tarjeta-egresos").style.display = "block";
      }
    }, "../login.html");
  </script>
</body>
</html>
