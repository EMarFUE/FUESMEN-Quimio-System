<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock · Servicio de quimioterapia</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="contenedor">
    <div class="encabezado-sesion">
      <div>
        <img src="../assets/FUESMEN-Logo.png" alt="FUESMEN" style="height: 32px; width: auto; margin-bottom: 8px;" />
        <div class="breadcrumb"><a href="../index.html">Inicio</a> &gt; <a href="index.html">Medicación</a> &gt; Stock</div>
        <h1 style="margin-bottom:0;">Stock</h1>
      </div>
      <div style="text-align:right;">
        <div class="datos-sesion" id="datos-sesion"></div>
        <button class="boton-secundario" style="margin-top:8px;" onclick="cerrarSesion('../login.html')">Cerrar sesión</button>
      </div>
    </div>

    <div class="barra-filtros-stock">
      <select id="filtro-deposito">
        <option value="">Todos los depósitos</option>
        <option value="FUESMEN">FUESMEN</option>
        <option value="Programa Oncológico">Programa Oncológico</option>
      </select>
      <input type="text" id="filtro-droga" placeholder="buscar droga..." autocomplete="off" />
      <button type="button" class="boton-secundario" onclick="exportarStockAExcel()">Exportar a Excel</button>
    </div>

    <table class="tabla">
      <thead>
        <tr>
          <th>Droga</th>
          <th>Marca</th>
          <th>Unidad</th>
          <th>Depósito</th>
          <th>Cantidad</th>
        </tr>
      </thead>
      <tbody id="cuerpo-tabla-stock"></tbody>
    </table>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/stock.js"></script>
  <script>
    requireAuth(async (user, datosUsuario) => {
      const rolLabel = ROLES[datosUsuario.rol] || datosUsuario.rol;
      document.getElementById("datos-sesion").innerHTML =
        `Hola, <strong>${datosUsuario.nombre || user.email}</strong> · rol: <strong>${rolLabel}</strong>`;

      await iniciarStock();
    }, "../login.html");
  </script>
</body>
</html>
