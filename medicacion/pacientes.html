<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacientes · Servicio de quimioterapia</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body style="visibility:hidden">
  <div class="contenedor">
    <div class="encabezado-sesion">
      <div>
        <img src="../assets/FUESMEN-Logo.png" alt="FUESMEN" style="height: 32px; width: auto; margin-bottom: 8px;" />
        <div class="breadcrumb"><a href="../index.html">Inicio</a> &gt; <a href="index.html">Medicación</a> &gt; Pacientes</div>
        <h1 style="margin-bottom:0;">Pacientes</h1>
      </div>
      <div style="text-align:right;">
        <div class="datos-sesion" id="datos-sesion"></div>
        <button class="boton-secundario" style="margin-top:8px;" onclick="cerrarSesion('../login.html')">Cerrar sesión</button>
      </div>
    </div>

    <div id="tarjeta-form-paciente" class="tarjeta-formulario" style="display:none;">
      <div class="encabezado-modulo">
        <strong id="titulo-formulario" style="font-size:14px;">Nuevo Paciente</strong>
        <button type="button" id="boton-cancelar-edicion" class="enlace-accion" style="display:none;">cancelar edición</button>
      </div>
      <div id="mensaje-form" class="mensaje-info" style="display:none;"></div>
      <form id="form-paciente">
        <div class="grid-form-pacientes-datos">
          <div class="campo">
            <label for="campo-tipo-documento">Tipo doc.</label>
            <select id="campo-tipo-documento">
              <option value="DNI" selected>DNI</option>
              <option value="LC">LC</option>
              <option value="LE">LE</option>
            </select>
          </div>
          <div class="campo">
            <label for="campo-numero-documento">Número</label>
            <input type="text" id="campo-numero-documento" inputmode="numeric" placeholder="41982305" required />
          </div>
          <div class="campo">
            <label for="campo-nombre">Nombre</label>
            <input type="text" id="campo-nombre" required />
          </div>
          <div class="campo">
            <label for="campo-apellido">Apellido</label>
            <input type="text" id="campo-apellido" required />
          </div>
        </div>
        <div class="grid-form-pacientes-obra-social">
          <div class="campo" style="margin-bottom:0;">
            <label for="campo-obra-social">Obra social</label>
            <select id="campo-obra-social"></select>
          </div>
          <div class="campo" style="margin-bottom:0;">
            <input type="text" id="campo-otra-obra-social" placeholder="nombre de la obra social" style="display:none; margin-top:20px;" />
          </div>
          <button type="submit" id="boton-guardar" class="boton-principal" style="width:auto; padding:10px 20px;">Guardar</button>
        </div>
      </form>
    </div>

    <input type="text" id="campo-busqueda" placeholder="buscar por documento o apellido..." class="campo-busqueda-pacientes" />

    <table class="tabla">
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Documento</th>
          <th>Apellido y nombre</th>
          <th>Obra social</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cuerpo-tabla-pacientes"></tbody>
    </table>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/pacientes.js"></script>
  <script>
    requireAuth(async (user, datosUsuario) => {
      const rolLabel = ROLES[datosUsuario.rol] || datosUsuario.rol;
      document.getElementById("datos-sesion").innerHTML =
        `Hola, <strong>${datosUsuario.nombre || user.email}</strong> · rol: <strong>${rolLabel}</strong>`;

      inicializarFormulario();
      aplicarPermisos(datosUsuario.rol);
      await cargarPacientes();
    }, "../login.html");
  </script>
</body>
</html>
