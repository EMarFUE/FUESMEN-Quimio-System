<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de medicamentos · Medicación</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="contenedor">
    <div class="encabezado-sesion">
      <div>
        <img src="../assets/FUESMEN-Logo.png" alt="FUESMEN" style="height: 32px; width: auto; margin-bottom: 8px;" />
        <div class="breadcrumb"><a href="../index.html">Inicio</a> &gt; <a href="index.html">Medicación</a> &gt; Catálogo de medicamentos</div>
        <h1 style="margin-bottom:0;">Catálogo de medicamentos</h1>
      </div>
      <div style="text-align:right;">
        <div class="datos-sesion" id="datos-sesion"></div>
        <button class="boton-secundario" style="margin-top:8px;" onclick="cerrarSesion('../login.html')">Cerrar sesión</button>
      </div>
    </div>

    <div id="mensaje-catalogo" class="mensaje-info" style="display:none;"></div>

    <div id="bloque-alta" style="display:none;">
      <div class="encabezado-modulo">
        <h3 style="margin:0;">Nuevo medicamento</h3>
        <label class="boton-secundario" style="cursor:pointer;">
          Importar desde Excel
          <input type="file" id="input-excel" accept=".xlsx,.xls" style="display:none;" />
        </label>
      </div>

      <div class="tarjeta-formulario">
        <form id="form-medicamento">
          <div class="grid-form-catalogo">
            <div class="campo">
              <label for="input-droga">Droga</label>
              <input type="text" id="input-droga" placeholder="Ej. Paclitaxel" required />
            </div>
            <div class="campo">
              <label for="input-marca">Marca (opcional)</label>
              <input type="text" id="input-marca" placeholder="Ej. Taxol" />
            </div>
          </div>
          <button type="submit" class="boton-principal" style="width:auto; padding:10px 18px;">Guardar medicamento</button>
        </form>
      </div>
    </div>

    <div id="bloque-importacion">
      <div id="previa-importacion" class="tarjeta-importacion" style="display:none;">
        <div style="font-weight:600; font-size:14px; margin-bottom:12px;">
          Previsualización de importación · <span id="nombre-archivo-importacion"></span>
        </div>
        <table class="tabla" style="margin-bottom:16px;">
          <thead>
            <tr><th>Droga</th><th>Marca</th><th>Estado</th></tr>
          </thead>
          <tbody id="cuerpo-tabla-previa"></tbody>
        </table>
        <button id="boton-confirmar-importacion" class="boton-principal" style="width:auto; padding:10px 18px;">Confirmar importación</button>
      </div>
    </div>

    <h3 style="margin:0 0 10px;">Medicamentos cargados</h3>
    <table class="tabla">
      <thead>
        <tr><th>Droga</th><th>Marca</th><th></th></tr>
      </thead>
      <tbody id="cuerpo-tabla-medicamentos"></tbody>
    </table>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../js/medicamentos.js"></script>
  <script>
    requireAuth((user, datosUsuario) => {
      const rolLabel = ROLES[datosUsuario.rol] || datosUsuario.rol;
      document.getElementById("datos-sesion").innerHTML =
        `Hola, <strong>${datosUsuario.nombre || user.email}</strong> · rol: <strong>${rolLabel}</strong>`;
      iniciarCatalogo(datosUsuario);
    }, "../login.html");
  </script>
</body>
</html>
